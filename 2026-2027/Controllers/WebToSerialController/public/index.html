<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Rover Control Panel</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header>
      <h1>Rover Control</h1>
      <div id="connection-indicators">
        <span id="move-status" class="status-badge disconnected">MOV</span>
        <span id="drill-status" class="status-badge disconnected">DRL</span>
        <span id="arm-status" class="status-badge disconnected">ARM</span>
        <span id="ws-status" class="status-badge disconnected">WS</span>
      </div>
    </header>

    <!-- Speed Control -->
    <section id="speed-section">
      <label>Speed: <span id="speed-value">30000</span></label>
      <input type="range" id="speed-slider" min="0" max="65535" value="30000" step="1000">
    </section>

    <!-- Main Controls Grid: 3 columns -->
    <div id="controls-grid">

      <!-- Column 1: Movement D-Pad -->
      <section id="movement-section" class="control-card">
        <h2>Movement</h2>
        <div id="dpad">
          <button id="btn-forward" class="move-btn" data-command="1">▲</button>
          <button id="btn-left" class="move-btn" data-command="4">◀</button>
          <button id="btn-stop" class="stop-btn" data-command="0">STOP</button>
          <button id="btn-right" class="move-btn" data-command="3">▶</button>
          <button id="btn-backward" class="move-btn" data-command="2">▼</button>
        </div>
        <div class="dpad-labels">
          <span></span><span>Fwd</span><span></span>
          <span>Left</span><span></span><span>Right</span>
          <span></span><span>Back</span><span></span>
        </div>
      </section>

      <!-- Column 2: Drill + Sample -->
      <div id="tools-column">
        <section id="drill-section" class="control-card">
          <h2>Drill</h2>
          <div class="motor-controls">
            <button id="btn-drill-fwd" class="tool-btn forward-btn">↻ Forward</button>
            <button id="btn-drill-rev" class="tool-btn reverse-btn">↺ Reverse</button>
            <button id="btn-drill-stop" class="tool-btn stop-sm-btn">■ Stop</button>
          </div>
        </section>

        <section id="sample-section" class="control-card">
          <h2>Sample</h2>
          <div class="motor-controls">
            <button id="btn-sample-extend" class="tool-btn forward-btn">↓ Extend</button>
            <button id="btn-sample-retract" class="tool-btn reverse-btn">↑ Retract</button>
            <button id="btn-sample-stop" class="tool-btn stop-sm-btn">■ Stop</button>
          </div>
        </section>
      </div>

      <!-- Column 3: Arm Servos (velocity mode) -->
      <div id="arm-column">
        <section id="arm-init-section" class="control-card">
          <button id="btn-arm-init" class="init-btn">⚡ Init Velocity Mode</button>
        </section>
        <section id="servo1-section" class="control-card">
          <h2>Servo 1</h2>
          <div class="motor-controls">
            <button id="btn-servo1-fwd" class="tool-btn forward-btn">↻ Forward</button>
            <button id="btn-servo1-rev" class="tool-btn reverse-btn">↺ Reverse</button>
            <button id="btn-servo1-stop" class="tool-btn stop-sm-btn">■ Stop</button>
          </div>
        </section>
        <section id="servo2-section" class="control-card">
          <h2>Servo 2</h2>
          <div class="motor-controls">
            <button id="btn-servo2-fwd" class="tool-btn forward-btn">↻ Forward</button>
            <button id="btn-servo2-rev" class="tool-btn reverse-btn">↺ Reverse</button>
            <button id="btn-servo2-stop" class="tool-btn stop-sm-btn">■ Stop</button>
          </div>
        </section>
      </div>
    </div>

    <!-- Emergency Stop Bar -->
    <section id="emergency-section">
      <button id="btn-emergency" class="emergency-btn">🛑 EMERGENCY STOP</button>
    </section>

    <!-- Debug Log -->
    <section id="debug-section">
      <div id="debug-header">
        <h2>Log</h2>
        <button id="btn-clear-log">Clear</button>
      </div>
      <div id="debug-log">
        <div class="log-entry system">Awaiting serial data...</div>
      </div>
    </section>

    <!-- Settings Panel (collapsible) -->
    <section id="settings-section">
      <button id="btn-toggle-settings">⚙ Settings</button>
      <div id="settings-panel" class="hidden">
        <div class="settings-row">
          <div class="settings-group">
            <h3>Movement</h3>
            <label>Path <input type="text" id="move-port-path" value="/dev/ttyUSB0"></label>
            <label>Baud <input type="number" id="move-port-baud" value="115200"></label>
          </div>
          <div class="settings-group">
            <h3>Drill/Sample</h3>
            <label>Path <input type="text" id="drill-port-path" value="/dev/ttyUSB1"></label>
            <label>Baud <input type="number" id="drill-port-baud" value="115200"></label>
          </div>
          <div class="settings-group">
            <h3>Arm (DXL Hat)</h3>
            <label>Path <input type="text" id="arm-port-path" value="/dev/ttyAMA0"></label>
            <label>Baud <input type="number" id="arm-port-baud" value="57600"></label>
          </div>
        </div>
        <div class="settings-actions">
          <button id="btn-apply-settings">Apply &amp; Reconnect</button>
          <button id="btn-refresh-ports">Refresh</button>
        </div>
      </div>
    </section>

    <!-- Keyboard Help -->
    <section id="help-section">
      <details>
        <summary>⌨ Shortcuts</summary>
        <div class="help-grid">
          <span><kbd>↑</kbd><kbd>W</kbd></span><span>Fwd</span>
          <span><kbd>↓</kbd><kbd>S</kbd></span><span>Back</span>
          <span><kbd>←</kbd><kbd>A</kbd></span><span>Left</span>
          <span><kbd>→</kbd><kbd>D</kbd></span><span>Right</span>
          <span><kbd>Spc</kbd><kbd>Esc</kbd></span><span>E-STOP</span>
          <span><kbd>Q</kbd></span><span>Drill Fwd</span>
          <span><kbd>E</kbd></span><span>Drill Rev</span>
          <span><kbd>R</kbd></span><span>Sample Ext</span>
          <span><kbd>F</kbd></span><span>Sample Ret</span>
          <span><kbd>1</kbd><kbd>2</kbd></span><span>S1 ±200 vel</span>
          <span><kbd>3</kbd><kbd>4</kbd></span><span>S2 ±200 vel</span>
          <span><kbd>I</kbd></span><span>Arm Init</span>
        </div>
      </details>
    </section>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/client.js"></script>
</body>
</html>
